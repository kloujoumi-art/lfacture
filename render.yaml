services:
  - type: web
    name: lfacture
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: TRIAL_DAYS
        value: 7
      - key: APP_NAME
        value: LFacture
      - key: APP_URL
        value: https://lfacture.onrender.com
